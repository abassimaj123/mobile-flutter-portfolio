name: 🔐 CI — Lint, Format, Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  analyze:
    name: Flutter Analyze — All Apps
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🔍 Analyze — All Flutter Apps
        run: |
          # Flutter apps tracked in this repo (ParkSmart + JobOfferUS have no own .git)
          # Other apps (AutoLoan, CreditCardAPR, etc.) have own .git but files still present
          apps=(
            "AutoLoan"
            "CreditCardAPR"
            "HELOCApp"
            "JobOfferUS"
            "LoanPayoffUS"
            "MortgageCA"
            "MortgageUK"
            "MortgageUS"
            "ParkSmart"
            "PropertyROISuite"
            "RentBuyUS"
            "RentalExpenses"
            "SalaryApp"
            "StudentLoan"
            "rideprofit"
          )

          failed=0
          for app in "${apps[@]}"; do
            if [ -f "$app/pubspec.yaml" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📦 Analyzing: $app"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cd "$app"
              flutter pub get
              if ! flutter analyze --no-pub; then
                echo "❌ FAILED: $app"
                failed=1
              else
                echo "✅ PASSED: $app"
              fi
              cd ..
            fi
          done

          if [ $failed -eq 1 ]; then
            echo ""
            echo "❌ Some apps failed analysis."
            exit 1
          fi
          echo ""
          echo "✅ All apps passed analysis!"

  format:
    name: Dart Format — Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🎨 Format Check — All Apps
        run: |
          apps=(
            "AutoLoan"
            "CreditCardAPR"
            "HELOCApp"
            "JobOfferUS"
            "LoanPayoffUS"
            "MortgageCA"
            "MortgageUK"
            "MortgageUS"
            "ParkSmart"
            "PropertyROISuite"
            "RentBuyUS"
            "RentalExpenses"
            "SalaryApp"
            "StudentLoan"
            "rideprofit"
          )

          failed=0
          for app in "${apps[@]}"; do
            if [ -f "$app/pubspec.yaml" ]; then
              echo "Checking format: $app"
              cd "$app"
              # Default line length (80) — matches local dart format
              if ! dart format --set-exit-if-changed lib/ test/ > /dev/null 2>&1; then
                echo "❌ Format issue in $app"
                dart format --set-exit-if-changed lib/ test/ 2>&1 | head -5
                failed=1
              else
                echo "✅ $app"
              fi
              cd ..
            fi
          done

          if [ $failed -eq 1 ]; then
            echo "❌ Format issues found. Run: dart format lib/ test/"
            exit 1
          fi
          echo "✅ All apps properly formatted!"

  test:
    name: 🧪 Flutter Test — All Apps
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🧪 Test — All 15 apps
        run: |
          apps=(
            "AutoLoan"
            "CreditCardAPR"
            "HELOCApp"
            "JobOfferUS"
            "LoanPayoffUS"
            "MortgageCA"
            "MortgageUK"
            "MortgageUS"
            "ParkSmart"
            "PropertyROISuite"
            "RentBuyUS"
            "RentalExpenses"
            "SalaryApp"
            "StudentLoan"
            "rideprofit"
          )

          failed=0
          total_passed=0
          for app in "${apps[@]}"; do
            if [ -f "$app/pubspec.yaml" ] && [ -d "$app/test" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🧪 Testing: $app"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              cd "$app"
              flutter pub get
              if ! flutter test --no-pub; then
                echo "❌ Tests FAILED: $app"
                failed=1
              else
                echo "✅ Tests PASSED: $app"
                ((total_passed++))
              fi
              cd ..
            fi
          done

          echo ""
          echo "══════════════════════════════════════"
          echo "  ${total_passed} apps passed"
          echo "══════════════════════════════════════"

          if [ $failed -eq 1 ]; then
            exit 1
          fi
          echo "✅ All tests passed!"

  # Summary job — must pass for merge
  check-result:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [analyze, format, test]
    if: always()

    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.analyze.result }}" != "success" ]; then
            echo "❌ Analyze failed"
            exit 1
          fi
          if [ "${{ needs.format.result }}" != "success" ]; then
            echo "❌ Format failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ] && [ "${{ needs.test.result }}" != "skipped" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All CI checks passed — safe to merge!"
