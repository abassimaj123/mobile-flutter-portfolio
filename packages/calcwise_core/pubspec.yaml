  google_mobile_ads:        ^5.1.0
  in_app_purchase:          ^3.2.0
  in_app_review:            ^2.0.9
  purchases_flutter:        ^8.0.0
  shared_preferences:       ^2.3.5
  intl:                     ^0.20.0
  flutter_local_notifications: ^18.0.1
  pdf:                      ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
