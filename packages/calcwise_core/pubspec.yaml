version: 1.0.0
homepage: https://github.com/abassimaj123/calcwise_core
repository: https://github.com/abassimaj123/calcwise_core

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_analytics:       ^11.3.3
  firebase_crashlytics:     ^4.1.3
