name: parksmart
description: ParkSmart — Règles de stationnement en temps réel pour Québec et Lévis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  calcwise_core:
    git:
      url: https://github.com/abassimaj123/calcwise_core.git
      ref: main
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: 0.20.2
  provider: ^6.1.2
  http: ^1.2.2
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  in_app_review: ^2.0.9
  share_plus: ^10.1.4
  pdf: ^3.11.1
  printing: ^5.13.1
  sqflite: ^2.3.1
  path: ^1.9.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false



